<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>나는 어떤 치과 히어로? | iEXCEL</title>
<style>
@import url('https://cdn.jsdelivr.net/npm/galmuri@latest/dist/galmuri.css');
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

:root {
  --green: #46b98c;
  --dark: #36393a;
  --red: #d52b1e;
  --green-deep: #2d7662;
  --black: #000000;
  --red-deep: #78050c;
  --white: #ffffff;
  --green-light: #6edbb3;
  --green-glow: rgba(70,185,140,0.3);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--black);
  color: var(--white);
  font-family: 'Galmuri14', monospace;
  overflow: hidden;
  min-height: 100vh;
  min-height: 100dvh;
  width: 100vw;
  -webkit-user-select:none;
  user-select:none;
  -webkit-font-smoothing: none;
  -moz-osx-font-smoothing: unset;
  }

body::after {
  content:''; position:fixed; inset:0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
  pointer-events:none; z-index:9999;
}

.screen {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition:opacity 0.3s;
  opacity:0; pointer-events:none;
  padding:16px;
  min-height:100vh;
  min-height:100dvh;
}
.screen.active { opacity:1; pointer-events:all; }


#title-screen,
#name-screen,
#transition-screen {
  padding-top:calc(env(safe-area-inset-top, 0px) + 16px);
  padding-bottom:calc(env(safe-area-inset-bottom, 0px) + 16px);
}

/* LOGO */
.logo-bar {
  position:absolute;
  bottom:calc(env(safe-area-inset-bottom, 0px) + 12px);
  left:0; right:0;
  display:flex; justify-content:center; align-items:center;
  z-index:10;
  opacity:0.5;
  pointer-events:none;
}
.logo-bar img {
  height:20px;
  image-rendering:auto;
  image-rendering:crisp-edges;
}

.title-pixel-chars canvas,
.runner canvas,
.result-character-area canvas {
  image-rendering: pixelated;
}


.starfield { position:fixed; inset:0; z-index:0; }
.starfield span {
  position:absolute; width:2px; height:2px;
  background:var(--green); opacity:0.4;
  animation:twinkle 2s ease-in-out infinite alternate;
}
@keyframes twinkle { 0%{opacity:0.1;} 100%{opacity:0.7;} }

.flash-overlay {
  position:fixed; inset:0; background:var(--white);
  z-index:200; opacity:0; pointer-events:none;
}
.flash-overlay.flash { animation:flashAnim 0.3s ease-out; }
@keyframes flashAnim { 0%{opacity:0.6;} 100%{opacity:0;} }

/* ===== TITLE ===== */
#title-screen {
  z-index:10;
  background: radial-gradient(ellipse at center, #1a3d2e 0%, var(--black) 70%);
}

.title-pixel-chars {
  display:flex; gap:6px; margin-bottom:20px;
}
.title-pixel-chars canvas {
  width:60px; height:60px; image-rendering:pixelated;
  filter: drop-shadow(0 0 10px var(--green-glow));
}
.title-pixel-chars canvas:nth-child(1) { animation: cf1 3s ease-in-out infinite; }
.title-pixel-chars canvas:nth-child(2) { animation: cf1 3s ease-in-out 0.4s infinite; }
.title-pixel-chars canvas:nth-child(3) { animation: cf1 3s ease-in-out 0.8s infinite; }
.title-pixel-chars canvas:nth-child(4) { animation: cf1 3s ease-in-out 1.2s infinite; }
.title-pixel-chars canvas:nth-child(5) { animation: cf1 3s ease-in-out 1.6s infinite; }
@keyframes cf1 { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }

.game-title {
  font-family:'Galmuri11','Press Start 2P',monospace;
  font-size:clamp(20px,5vw,36px);
  color:var(--green);
  text-align:center;
  text-shadow:0 0 10px var(--green),0 0 20px var(--green),3px 3px 0 var(--green-deep);
  margin-bottom:8px; line-height:1.6;
  animation:titlePulse 2s ease-in-out infinite;
}
@keyframes titlePulse {
  0%,100%{text-shadow:0 0 10px var(--green),0 0 20px var(--green),3px 3px 0 var(--green-deep);}
  50%{text-shadow:0 0 20px var(--green),0 0 40px var(--green),3px 3px 0 var(--green-deep);}
}

.subtitle {
  font-family:'Galmuri11',monospace;
  font-size:clamp(10px,2.2vw,14px);
  color:var(--green-light);
  text-align:center; margin-bottom:32px; opacity:0.8;
}

.start-btn, .name-submit-btn {
  font-family:'Galmuri11','Press Start 2P',monospace;
  font-size:clamp(13px,2.8vw,18px);
  color:var(--black); background:var(--green);
  border:none; padding:14px 40px; cursor:pointer;
  box-shadow:4px 4px 0 var(--green-deep),inset -2px -2px 0 var(--green-deep),inset 2px 2px 0 var(--green-light);
  transition:transform 0.1s;
}
.start-btn:hover,.name-submit-btn:hover { transform:scale(1.05); }
.start-btn:active,.name-submit-btn:active { transform:scale(0.95); }

/* ===== NAME ===== */
#name-screen {
  z-index:10;
  background: radial-gradient(ellipse at center, #1a3d2e 0%, var(--black) 70%);
}
.name-label {
  font-family:'Galmuri11',monospace;
  font-size:clamp(14px,3vw,20px);
  color:var(--green); margin-bottom:16px;
  text-shadow:0 0 8px var(--green-glow);
}
.name-input {
  font-family:'Galmuri11',monospace;
  font-size:clamp(16px,4vw,24px);
  color:var(--green);
  background:rgba(13,43,30,0.9);
  border:3px solid var(--green);
  box-shadow:inset -3px -3px 0 var(--green-deep),inset 3px 3px 0 var(--green-light);
  padding:14px 24px; text-align:center; outline:none;
  width:clamp(240px,60vw,360px); margin-bottom:20px;
  caret-color:var(--green);
}
.name-input::placeholder { color:rgba(70,185,140,0.4); }
.name-skip {
  font-family:'Galmuri11',monospace; font-size:11px;
  color:var(--green-deep); background:none; border:none;
  cursor:pointer; margin-top:8px; text-decoration:underline;
}
.name-skip:hover { color:var(--green-light); }

/* ===== TRANSITION ===== */
#transition-screen { z-index:100; background:var(--black); }
.runners-container { position:relative; width:100%; height:200px; overflow:hidden; }
.runner {
  position:absolute; bottom:40px;
  animation:runAcross 2.5s linear forwards;
}
.runner canvas { width:64px; height:64px; image-rendering:pixelated; }
@keyframes runAcross { 0%{left:-80px;} 100%{left:calc(100% + 80px);} }
.runner:nth-child(2){animation-delay:0.3s;bottom:50px;}
.runner:nth-child(3){animation-delay:0.6s;bottom:30px;}
.runner:nth-child(4){animation-delay:0.15s;bottom:60px;}
.runner:nth-child(5){animation-delay:0.45s;bottom:45px;}

.transition-ground {
  position:absolute; bottom:0; width:100%; height:24px;
  background:repeating-linear-gradient(90deg,var(--green-deep) 0px,var(--green-deep) 16px,#23574a 16px,#23574a 32px);
  animation:scrollGround 0.5s linear infinite;
}
@keyframes scrollGround { 0%{background-position:0 0;} 100%{background-position:-32px 0;} }

.loading-text {
  font-family:'Galmuri11',monospace;
  font-size:clamp(10px,2vw,14px);
  color:var(--green); margin-top:24px;
  animation:blink 0.8s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.5;} }

/* ===== QUESTION ===== */
#question-screen {
  z-index:10;
  background:radial-gradient(ellipse at center bottom,#0d2b1e 0%,var(--black) 70%);
  justify-content:flex-start;
  padding-top:calc(env(safe-area-inset-top, 0px) + 36px);
  padding-bottom:calc(env(safe-area-inset-bottom, 0px) + 84px);
}
.question-hud {
  width:100%; max-width:600px;
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:12px; padding:0 8px;
}
.hp-bar-container { display:flex; align-items:center; gap:8px; }
.hp-label { font-family:'Galmuri11',monospace; font-size:10px; color:var(--green); }
.hp-bar { width:120px; height:14px; background:var(--dark); border:2px solid var(--green); overflow:hidden; }
.hp-fill { height:100%; background:var(--green); transition:width 0.5s ease; box-shadow:inset 0 -4px 0 var(--green-deep); }
.q-number { font-family:'Galmuri11',monospace; font-size:clamp(14px,3.5vw,22px); color:var(--green); text-shadow:2px 2px 0 var(--green-deep); }

.question-box {
  width:100%; max-width:600px;
  background:rgba(13,43,30,0.9);
  padding:clamp(14px,3.5vw,24px); margin-bottom:12px;
  border:3px solid var(--green);
  box-shadow:inset -3px -3px 0 var(--green-deep),inset 3px 3px 0 var(--green-light),0 0 20px var(--green-glow);
}
.question-text {
  font-family:'Galmuri11',monospace;
  font-size:clamp(13px,3vw,17px);
  line-height:1.8; color:var(--white); text-align:center;
}

.options-container {
  width:100%; max-width:600px;
  display:flex; flex-direction:column; gap:6px;
  overflow-y:auto; flex:1;
  padding-bottom:16px;
  min-height:0;
}

.option-btn {
  width:100%; background:rgba(45,118,98,0.3);
  border:2px solid var(--green-deep);
  padding:clamp(10px,2.5vw,14px) clamp(14px,3.5vw,20px);
  cursor:pointer; font-family:'Galmuri11',monospace;
  font-size:clamp(11px,2.3vw,14px);
  color:#b8e8d4; text-align:left;
  transition:all 0.15s; line-height:1.6;

  -webkit-tap-highlight-color: transparent;
}
@media (hover: hover) and (pointer: fine) {
  .option-btn:hover {
    background:rgba(70,185,140,0.3);
    border-color:var(--green); color:var(--white);
    transform:translateX(4px); box-shadow:0 0 12px var(--green-glow);
  }
}
.option-btn:active { background:var(--green); color:var(--black); }
.option-btn.selected {
  background:var(--green); border-color:var(--green-light); color:var(--black);
  box-shadow:0 0 16px rgba(70,185,140,0.5),inset -2px -2px 0 var(--green-deep),inset 2px 2px 0 var(--green-light);
}

.q-back-btn {
  width: 100%;
  max-width: 600px;
  font-family:'Galmuri11', monospace;
  font-size: 12px;
  color: var(--green-deep);
  background: none;
  border: 2px solid rgba(45,118,98,0.3);
  padding: 10px;
  cursor: pointer;
  margin-top: 8px;
  margin-bottom: 0;
  transition: all 0.15s;
  position: relative;
  z-index: 20;
}
.q-back-btn:hover { border-color:var(--green); color:var(--green-light); }

/* ===== RESULT ===== */
#result-screen {
  z-index:10;
  background:radial-gradient(ellipse at center,#1a3d2e 0%,var(--black) 70%);
  overflow-y:auto;
  justify-content:flex-start;
  padding-top:calc(env(safe-area-inset-top, 0px) + 36px);
  padding-bottom:calc(env(safe-area-inset-bottom, 0px) + 84px);
}
.result-container { max-width:600px; width:100%; text-align:center; padding:8px 16px 24px; position:relative; z-index:20; }

.result-badge {
  font-family:'Galmuri11',monospace; font-size:clamp(10px,2vw,13px);
  color:var(--green); background:rgba(70,185,140,0.15);
  border:2px solid var(--green-deep);
  padding:8px 20px; display:inline-block; margin-bottom:16px;
  animation:blink 1.5s step-end infinite;
}
.result-character-area {
  width:120px; height:120px; margin:0 auto 16px;
  animation:float 2s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
.result-character-area canvas { width:120px; height:120px; image-rendering:pixelated; }

.result-type-name {
  font-family:'Galmuri11',monospace;
  font-size:clamp(16px,4vw,28px); color:var(--green);
  text-shadow:0 0 10px var(--green),3px 3px 0 var(--green-deep);
  margin-bottom:4px; line-height:1.5;
}
.result-type-sub {
  font-family:'Galmuri11',monospace; font-size:clamp(12px,2.5vw,16px);
  color:var(--green-light); margin-bottom:16px;
}
.result-desc-box {
  background:#0d2b1e; border:3px solid var(--green);
  padding:clamp(14px,3.5vw,22px); margin-bottom:16px; text-align:left;
}
.result-desc {
  font-family:'Galmuri11',monospace;
  font-size:clamp(11px,2.3vw,14px); color:#b8e8d4; line-height:2;
}
.stat-bars { display:flex; flex-direction:column; gap:6px; margin-top:14px; }
.stat-row { display:flex; align-items:center; gap:8px; }
.stat-label { font-family:'Galmuri11',monospace; font-size:9px; color:var(--green); width:40px; text-align:right; flex-shrink:0; }
.stat-bar { flex:1; height:10px; background:var(--dark); border:1px solid var(--green-deep); overflow:hidden; }
.stat-fill { height:100%; background:var(--green); transition:width 1s ease; box-shadow:inset 0 -3px 0 var(--green-deep); }

.btn-group { display:flex; flex-direction:column; align-items:center; gap:10px; margin-top:20px; }
.retry-btn {
  font-family:'Galmuri11',monospace; font-size:clamp(11px,2vw,15px);
  color:var(--black); background:var(--green);
  border:none; padding:12px 32px; cursor:pointer;
  box-shadow:4px 4px 0 var(--green-deep),inset -2px -2px 0 var(--green-deep),inset 2px 2px 0 var(--green-light);
}
.retry-btn:hover { transform:scale(1.05); }
.share-btn,.link-btn {
  font-family:'Galmuri11',monospace; font-size:clamp(9px,1.8vw,12px);
  color:var(--green-light); background:var(--dark);
  border:2px solid var(--green-deep);
  padding:10px 24px; cursor:pointer; width:240px;
}
.share-btn:hover,.link-btn:hover { background:var(--green-deep); color:var(--white); }
.home-btn {
  font-family:'Galmuri11',monospace; font-size:11px; color:var(--green-deep);
  background:none; border:2px solid rgba(45,118,98,0.3);
  padding:10px 24px; cursor:pointer; width:240px;
}
.home-btn:hover { border-color:var(--green); color:var(--green-light); }

::-webkit-scrollbar { width:8px; }
::-webkit-scrollbar-track { background:var(--black); }
::-webkit-scrollbar-thumb { background:var(--green-deep); border:1px solid var(--green); }






/* ===== Responsive layout tuning ===== */
@media (min-width: 769px) {
  #question-screen,
  #result-screen {
    padding-top: 24px;
    padding-bottom: 88px;
  }

  .logo-bar img {
    height: 18px;
  }

  .q-back-btn {
    margin-top: 10px;
  }

  .btn-group {
    margin-bottom: 0;
  }
}

@media (max-width: 768px) {
  #question-screen {
    padding-top: calc(env(safe-area-inset-top, 0px) + 72px);
    padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 92px);
  }

  #result-screen {
    padding-top: calc(env(safe-area-inset-top, 0px) + 54px);
    padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 96px);
  }

  .logo-bar {
    bottom: calc(env(safe-area-inset-bottom, 0px) + 10px);
  }

  .logo-bar img {
    height: 16px;
  }

  .q-back-btn {
    margin-top: 8px;
  }
}






@media (max-width: 480px) {
  .logo-bar img {
    height: 18px;
  }

  #question-screen {
    padding-top: calc(env(safe-area-inset-top, 0px) + 72px);
    padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 94px);
  }

  #result-screen {
    padding-top: calc(env(safe-area-inset-top, 0px) + 54px);
    padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 102px);
  }

  .question-hud {
    margin-bottom: 10px;
  }

  .question-box {
    margin-bottom: 10px;
    padding: 14px 16px;
  }

  .question-text {
    font-size: 14px;
    line-height: 1.7;
  }

  .options-container {
    gap: 8px;
    padding-bottom: 14px;
  }

  .option-btn {
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.6;
  }

  .q-back-btn {
    font-size: 13px;
    margin-bottom: 48px;
  }

  .result-container {
    padding: 6px 12px 12px;
  }

  .result-badge {
    font-size: 10px;
    padding: 6px 14px;
    margin-bottom: 10px;
  }

  .result-character-area,
  .result-character-area canvas {
    width: 82px;
    height: 82px;
    margin-bottom: 8px;
  }

  .result-type-name {
    font-size: 20px;
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .result-type-sub {
    font-size: 13px;
    margin-bottom: 10px;
  }

  .result-desc-box {
    padding: 12px;
    margin-bottom: 10px;
  }

  .result-desc {
    font-size: 12px;
    line-height: 1.8;
  }

  .stat-bars {
    gap: 5px;
    margin-top: 10px;
  }

  .stat-label {
    width: 34px;
    font-size: 10px;
  }

  .stat-bar {
    height: 8px;
  }

  .btn-group {
    gap: 8px;
    margin-top: 12px;
  }

  .retry-btn {
    font-size: 12px;
    padding: 10px 24px;
  }

  .share-btn,
  .link-btn,
  .home-btn {
    width: min(240px, 78vw);
    padding: 9px 16px;
    font-size: 11px;
  }
}

@media (max-width: 480px) and (max-height: 820px) {
  .result-character-area,
  .result-character-area canvas {
    width: 72px;
    height: 72px;
  }

  .result-type-name {
    font-size: 18px;
  }

  .result-type-sub {
    font-size: 12px;
    margin-bottom: 8px;
  }

  .result-desc {
    font-size: 11px;
    line-height: 1.65;
  }

  .result-desc-box {
    padding: 10px;
  }

  .btn-group {
    gap: 6px;
    margin-top: 10px;
  }

  .retry-btn {
    padding: 8px 20px;
    font-size: 11px;
  }

  .share-btn,
  .link-btn,
  .home-btn {
    width: min(220px, 74vw);
    padding: 8px 14px;
    font-size: 10px;
  }

  .logo-bar img {
    height: 16px;
  }

  .logo-bar {
    opacity: 0.4;
  }
}

</style>
</head>
<body>
<div class="starfield" id="starfield"></div>
<div class="flash-overlay" id="flash"></div>

<!-- TITLE -->
<div class="screen active" id="title-screen">
  <div class="title-pixel-chars" id="title-chars"></div>
  <div class="game-title">나는 어떤<br>치과 히어로?</div>
  <div class="subtitle">&#9656; iEXCEL Hero Persona Test &#9666;</div>
  <button class="start-btn" onclick="goToName()">&#9654; START</button>
  <div class="logo-bar"><img id="logo-img" alt="Straumann"></div>
</div>

<!-- NAME -->
<div class="screen" id="name-screen">
  <div class="name-label">&#9733; 원장님의 성함을 입력하세요 &#9733;</div>
  <input type="text" class="name-input" id="name-input" placeholder="예: 홍길동" maxlength="10" autocomplete="off">
  <button class="name-submit-btn" onclick="submitName()">NEXT &#9654;</button>
  <button class="name-skip" onclick="skipName()">건너뛰기</button>
  <div class="logo-bar"><img class="logo-copy" alt="Straumann"></div>
</div>

<!-- TRANSITION -->
<div class="screen" id="transition-screen">
  <div class="runners-container" id="runners"><div class="transition-ground"></div></div>
  <div class="loading-text">LOADING NEXT QUEST...</div>
  <div class="logo-bar"><img class="logo-copy" alt="Straumann"></div>
</div>

<!-- QUESTIONS -->
<div class="screen" id="question-screen">
  <div class="question-hud">
    <div class="hp-bar-container">
      <span class="hp-label">QUEST</span>
      <div class="hp-bar"><div class="hp-fill" id="hp-fill" style="width:0%"></div></div>
    </div>
    <div class="q-number" id="q-number">Q1</div>
  </div>
  <div class="question-box"><div class="question-text" id="question-text"></div></div>
  <div class="options-container" id="options-container"></div>
  <button class="q-back-btn" id="q-back-btn" onclick="goBackQuestion()">&#9664; 이전으로</button>
  <div class="logo-bar"><img class="logo-copy" alt="Straumann"></div>
</div>

<!-- RESULT -->
<div class="screen" id="result-screen">
  <div class="result-container" id="result-capture">
    <div class="result-badge">&#9733; QUEST COMPLETE &#9733;</div>
    <div class="result-character-area" id="result-char"></div>
    <div class="result-type-name" id="result-name"></div>
    <div class="result-type-sub" id="result-sub"></div>
    <div class="result-desc-box">
      <div class="result-desc" id="result-desc"></div>
      <div class="stat-bars" id="stat-bars"></div>
    </div>
    <div class="btn-group">
      <button class="retry-btn" onclick="retry()">&#8635; 다시하기</button>
      <button class="share-btn" onclick="saveResultImage()">&#128248; 결과 이미지 저장하기</button>
      <button class="link-btn" onclick="copyLink()">&#128279; 테스트 공유하기</button>
      <button class="home-btn" onclick="goHome()">&#9664; 처음으로</button>
    </div>
  </div>

// ===== 24x24 DETAILED PIXEL CHARACTER DRAWING =====
// Each character: 24x24 grid
const S = '#FFDBC4'; // skin
const BK = '#1a1a1a'; // black
const SH = '#222222'; // shoe
const G = '#2d7662'; // green deep
const GL = '#46b98c'; // green light
const GLL = '#6edbb3'; // green lighter
const W = '#e8e8e8'; // white coat
const GR = '#b0b0b0'; // gray
const VR = '#707070'; // VR color
const VRD = '#505050'; // VR dark
const BR = '#4a3020'; // brown hair
const DBR = '#3a2010'; // dark brown
const MR = '#e06050'; // mouth red

function drawChar24(canvas, type, size) {
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  const p = size / 24;
  function px(x,y,c) { ctx.fillStyle=c; ctx.fillRect(x*p,y*p,p,p); }
  function row(y,x1,x2,c) { for(let x=x1;x<=x2;x++) px(x,y,c); }
  function col(x,y1,y2,c) { for(let y=y1;y<=y2;y++) px(x,y,c); }
  function rect(x1,y1,x2,y2,c) { for(let y=y1;y<=y2;y++) row(y,x1,x2,c); }

  if(type === 'entrepreneur') {
    // Black hair, green suit, arms crossed, star badge on chest
    // Hair
    row(2,8,15,BK); row(3,7,16,BK); row(4,6,17,BK);
    // Head
    rect(7,5,16,9,S); row(10,8,15,S);
    // Eyes
    px(9,7,BK); px(10,7,BK); px(13,7,BK); px(14,7,BK);
    // Mouth
    px(11,9,MR); px(12,9,MR);
    // Green suit body

// Running version (simplified but matching)
function drawRunChar24(canvas, type, size, frame) {
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  const p = size / 24;
  function px(x,y,c) { ctx.fillStyle=c; ctx.fillRect(x*p,y*p,p,p); }
  function row(y,x1,x2,c) { for(let x=x1;x<=x2;x++) px(x,y,c); }
  function rect(x1,y1,x2,y2,c) { for(let y=y1;y<=y2;y++) row(y,x1,x2,c); }

  const colors = {
    entrepreneur: { hair:BK, shirt:G },
    technologist: { hair:BR, shirt:G },
    scientist: { hair:S, shirt:W },
    educator: { hair:DBR, shirt:W },
    craftperson: { hair:DBR, shirt:G }
  };
  const c = colors[type];

  // Hair
  row(2,8,15,c.hair); row(3,7,16,c.hair); row(4,6,17,c.hair);
  // Head
  rect(7,5,16,10,S);
  // Eyes & mouth
  px(9,7,BK); px(14,7,BK);
  px(11,9,MR); px(12,9,MR);
  // Body
  rect(7,11,16,15,c.shirt);

  // Running legs
  if(frame % 2 === 0) {
    // Arms swing
    rect(5,12,6,14,S); rect(17,12,18,14,S);
    // Left leg forward
    rect(7,16,10,17,'#36393a'); px(6,18,SH); px(7,18,SH);
    // Right leg back
    rect(13,16,16,17,'#36393a'); px(16,18,SH); px(17,18,SH);
  } else {
    rect(4,12,5,14,S); rect(18,12,19,14,S);
    rect(7,16,10,17,'#36393a'); px(10,18,SH); px(11,18,SH);
    rect(13,16,16,17,'#36393a'); px(12,18,SH); px(13,18,SH);
  }

  // Dust particles
  ctx.fillStyle = 'rgba(70,185,140,0.6)';
  if(frame%2===0) { ctx.fillRect(2*p,19*p,p,p); ctx.fillRect(3*p,20*p,p,p); }
  else { ctx.fillRect(3*p,19*p,p,p); ctx.fillRect(1*p,20*p,p,p); }
}

// Nav
function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function flash() { const f=document.getElementById('flash'); f.classList.remove('flash'); void f.offsetWidth; f.classList.add('flash'); }

function goToName() { flash(); showScreen('name-screen'); setTimeout(()=>document.getElementById('name-input').focus(),400); }
function submitName() { playerName=document.getElementById('name-input').value.trim()||''; startQuiz(); }
function skipName() { playerName=''; startQuiz(); }
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')submitName();});

function startQuiz() { flash(); currentQ=0; answers=[]; showTransition(()=>{showQuestion();showScreen('question-screen');}); }

function showTransition(cb) {
  showScreen('transition-screen');
  const r=document.getElementById('runners');
  r.querySelectorAll('.runner').forEach(x=>x.remove());
  const types=['entrepreneur','technologist','craftperson','scientist','educator'];
  let fc=[0,0,0,0,0];
  types.forEach((t,i)=>{
    const d=document.createElement('div'); d.className='runner';
    const cv=document.createElement('canvas'); d.appendChild(cv); r.appendChild(d);
    const iv=setInterval(()=>{fc[i]++;drawRunChar24(cv,t,128,fc[i]);},180);
    setTimeout(()=>clearInterval(iv),3000);
  });
  setTimeout(()=>{flash();cb();},2200);
}

function showQuestion() {
  const q=questions[currentQ];
  document.getElementById('q-number').textContent='Q'+(currentQ+1);
  document.getElementById('hp-fill').style.width=(currentQ/questions.length*100)+'%';
  document.getElementById('question-text').textContent=q.q;
  const c=document.getElementById('options-container'); c.innerHTML='';
  q.options.forEach(o=>{
    const b=document.createElement('button'); b.className='option-btn';
    b.textContent=o.text; b.onclick=()=>selectOption(o.type,b); c.appendChild(b);
  });
  document.getElementById('q-back-btn').textContent=currentQ===0?'\u25C0 처음으로':'\u25C0 이전으로';
}

function selectOption(t,b) {
  document.querySelectorAll('.option-btn').forEach(x=>x.classList.remove('selected'));
  b.classList.add('selected'); answers.push(t);
  setTimeout(()=>{flash();currentQ++;currentQ>=questions.length?showTransition(()=>showResult()):showQuestion();},400);
}

function goBackQuestion() { if(currentQ<=0){flash();showScreen('title-screen');return;} flash();currentQ--;answers.pop();showQuestion(); }
function goHome() { flash(); showScreen('title-screen'); }

function showResult() {
  const scores=getScores(); let mx=0,w='entrepreneur';
  for(const[k,v]of Object.entries(scores)){if(v>mx){mx=v;w=k;}}
  currentResult=w; const p=personas[w]; const n=playerName?(playerName+' '):'';
  document.getElementById('result-name').textContent=p.name;
  document.getElementById('result-sub').textContent=p.sub;
  document.getElementById('result-desc').textContent=p.desc(n);
  const ca=document.getElementById('result-char'); ca.innerHTML='';
  const cv=document.createElement('canvas'); drawChar24(cv,w,240); ca.appendChild(cv);
  const sd=document.getElementById('stat-bars'); sd.innerHTML='';
  [['BIZ',scores.entrepreneur],['TECH',scores.technologist],['ART',scores.craftperson],['SCI',scores.scientist],['EDU',scores.educator]].forEach(([l,s])=>{
    const pct=Math.round((s/questions.length)*100);
    const r=document.createElement('div');r.className='stat-row';
    r.innerHTML='<span class="stat-label">'+l+'</span><div class="stat-bar"><div class="stat-fill" style="width:0%" data-p="'+pct+'"></div></div>';
    sd.appendChild(r);
  });
  document.getElementById('hp-fill').style.width='100%';
  showScreen('result-screen');
  setTimeout(()=>{sd.querySelectorAll('.stat-fill').forEach(f=>{f.style.width=f.dataset.p+'%';});},300);
}

  try {
    const cv=await html2canvas(el,{backgroundColor:'#000',scale:2,useCORS:true,logging:false});
    const a=document.createElement('a');a.download='my-dental-hero.png';a.href=cv.toDataURL('image/png');a.click();
  } catch(e){console.error(e);}
}

function copyLink() {
  const url=window.location.href;
  if(navigator.clipboard){navigator.clipboard.writeText(url).then(()=>{
    const b=document.querySelector('.link-btn');const o=b.textContent;b.textContent='✓ 링크 복사 완료!';setTimeout(()=>b.textContent=o,2000);
  });}
}
</script>
